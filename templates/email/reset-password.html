<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Email</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background:#f4f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Card Container */

.container{
    width:420px;
    background:white;
    border-radius:12px;
    box-shadow:0 8px 25px rgba(0,0,0,0.1);
    overflow:hidden;
}

/* Header */

.header{
    background:linear-gradient(135deg,#077dcc,#004065);
    padding:20px;
    text-align:center;
    color:white;
}

.header h2{
    font-size:24px;
    letter-spacing:1px;
}

/* Main */

main{
    padding:30px;
    text-align:center;
}

main p{
    font-size:16px;
    color:#444;
    margin-bottom:20px;
    line-height:1.6;
}

/* OTP Box */

.otp-container{
    border:2px dashed #004065;
    border-radius:10px;
    padding:18px 28px;
    font-weight:700;
    font-size:32px;
    letter-spacing:6px;
    color:#002135;
    display:inline-block;
    background:#f1f8ff;
}

/* Footer */

.footer{
    margin-top:25px;
    font-size:13px;
    color:#777;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h2>Email Verification</h2>
</div>

<main>
<p>
Welcome {{username}} to our platform.  
Use the OTP below to verify your email address.
</p>

<div class="otp-container">
{{otp}}
</div>

<div class="footer">
<p>This code will expire in a few minutes.</p>
</div>

</main>

</div>

</body>
</html>
